version: 2

builds:
  - binary: kachlan
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - format: tar.gz
    name_template: "kachlan_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

brews:
  - repository:
      owner: kmtusher97
      name: homebrew-tap
    homepage: "https://github.com/kmtusher97/kachlan"
    description: "Fast video compression powered by ffmpeg"
    license: "MIT"
    dependencies:
      - name: ffmpeg
