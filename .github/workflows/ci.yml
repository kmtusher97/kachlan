name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-media:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    defaults:
      run:
        working-directory: media

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: media/go.mod

      - name: Install ffmpeg
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update && sudo apt-get install -y ffmpeg
          else
            brew install ffmpeg
          fi

      - name: Test
        run: go test -v -race ./...

  test-cli:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    defaults:
      run:
        working-directory: cli

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum

      - name: Install ffmpeg
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update && sudo apt-get install -y ffmpeg
          else
            brew install ffmpeg
          fi

      - name: Build
        run: make build

      - name: Test
        run: go test -v -race ./...

  test-gui:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    defaults:
      run:
        working-directory: gui

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: gui/go.mod
          cache-dependency-path: gui/go.sum

      - name: Install system dependencies
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update && sudo apt-get install -y ffmpeg libgtk-3-dev libwebkit2gtk-4.1-dev
          else
            brew install ffmpeg
          fi

      - name: Set Wails build tags
        id: wails-tags
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            echo "tags=-tags webkit2gtk_41" >> "$GITHUB_OUTPUT"
          else
            echo "tags=" >> "$GITHUB_OUTPUT"
          fi

      - name: Test
        run: go test -v -race ${{ steps.wails-tags.outputs.tags }} ./...

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        run: wails build ${{ steps.wails-tags.outputs.tags }}

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum

      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: cli
