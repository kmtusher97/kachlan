name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
          workdir: cli
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

  release-gui:
    needs: release-cli
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: darwin/universal
            artifact: kachlan-gui_darwin_universal.dmg
          - os: windows-latest
            platform: windows/amd64
            artifact: kachlan-gui_windows_amd64.zip
          - os: ubuntu-latest
            platform: linux/amd64
            artifact: kachlan-gui_linux_amd64.deb
    runs-on: ${{ matrix.os }}

    defaults:
      run:
        working-directory: gui

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: gui/go.mod
          cache-dependency-path: gui/go.sum

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails
        shell: bash
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        shell: bash
        run: |
          TAGS=""
          if [ "$RUNNER_OS" = "Linux" ]; then
            TAGS="-tags webkit2gtk_41"
          fi
          wails build -platform ${{ matrix.platform }} $TAGS

      - name: Bundle ffmpeg (macOS)
        if: runner.os == 'macOS'
        run: |
          # Download ffmpeg and ffprobe static builds
          curl -L -o /tmp/ffmpeg.7z https://evermeet.cx/ffmpeg/getrelease/ffmpeg/7z
          curl -L -o /tmp/ffprobe.7z https://evermeet.cx/ffmpeg/getrelease/ffprobe/7z
          # Extract using 7z (pre-installed on macOS runners)
          7z x /tmp/ffmpeg.7z -o/tmp/ffmpeg-extracted
          7z x /tmp/ffprobe.7z -o/tmp/ffprobe-extracted
          # Copy to app bundle
          cp /tmp/ffmpeg-extracted/ffmpeg build/bin/kachlan.app/Contents/MacOS/
          cp /tmp/ffprobe-extracted/ffprobe build/bin/kachlan.app/Contents/MacOS/
          # Make executable
          chmod +x build/bin/kachlan.app/Contents/MacOS/ffmpeg
          chmod +x build/bin/kachlan.app/Contents/MacOS/ffprobe

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          # Remove quarantine attributes from the app bundle
          xattr -cr build/bin/kachlan.app

          # Ad-hoc code signing (no certificate required, helps with Gatekeeper)
          codesign --force --deep --sign - build/bin/kachlan.app

          brew install create-dmg
          create-dmg \
            --volname "kachlan" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "kachlan.app" 175 190 \
            --hide-extension "kachlan.app" \
            --app-drop-link 425 190 \
            "${{ matrix.artifact }}" \
            "build/bin/kachlan.app"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd build/bin
          7z a ../../${{ matrix.artifact }} kachlan.exe

      - name: Bundle ffmpeg (Linux)
        if: runner.os == 'Linux'
        run: |
          # Download ffmpeg static build
          curl -L -o /tmp/ffmpeg.tar.xz https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz
          # Extract
          tar xf /tmp/ffmpeg.tar.xz -C /tmp
          # Find and copy ffmpeg binary
          find /tmp/ffmpeg-*-amd64-static -name ffmpeg -exec cp {} build/bin/ \;
          find /tmp/ffmpeg-*-amd64-static -name ffprobe -exec cp {} build/bin/ \;
          # Make executable
          chmod +x build/bin/ffmpeg build/bin/ffprobe

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          VERSION=${VERSION#v}

          # Create .deb package structure
          mkdir -p deb-package/DEBIAN
          mkdir -p deb-package/usr/bin
          mkdir -p deb-package/usr/share/applications
          mkdir -p deb-package/usr/share/icons/hicolor/scalable/apps

          # Copy binary and bundled ffmpeg
          cp build/bin/kachlan deb-package/usr/bin/
          cp build/bin/ffmpeg deb-package/usr/bin/kachlan-ffmpeg
          cp build/bin/ffprobe deb-package/usr/bin/kachlan-ffprobe

          # Copy desktop entry and icon
          cp kachlan.desktop deb-package/usr/share/applications/
          cp ../assets/logo.svg deb-package/usr/share/icons/hicolor/scalable/apps/kachlan.svg

          # Create doc directory and copy LICENSE
          mkdir -p deb-package/usr/share/doc/kachlan
          cp ../LICENSE deb-package/usr/share/doc/kachlan/

          # Calculate installed size
          INSTALLED_SIZE=$(du -sk deb-package/usr | cut -f1)

          # Create control file
          cat > deb-package/DEBIAN/control << EOF
          Package: kachlan
          Version: ${VERSION}
          Section: video
          Priority: optional
          Architecture: amd64
          Installed-Size: ${INSTALLED_SIZE}
          Depends: libgtk-3-0, libwebkit2gtk-4.1-0
          Maintainer: kmtusher97 <kmtusher97@users.noreply.github.com>
          Homepage: https://github.com/kmtusher97/kachlan
          Description: Fast video compression powered by ffmpeg
           Kachlan is a graphical desktop app for video compression with drag-and-drop,
           progress bar, and quality controls. Includes bundled ffmpeg and ffprobe.
           .
           No manual setup required - ffmpeg is included in the package.
          EOF

          # Create copyright file
          mkdir -p deb-package/usr/share/doc/kachlan
          cat > deb-package/usr/share/doc/kachlan/copyright << EOF
          Format: https://www.debian.org/doc/packaging-manuals/copyright-format/1.0/
          Upstream-Name: kachlan
          Upstream-Contact: kmtusher97
          Source: https://github.com/kmtusher97/kachlan

          Files: *
          Copyright: 2026 kachlan contributors
          License: MIT
           Permission is hereby granted, free of charge, to any person obtaining a copy
           of this software and associated documentation files (the "Software"), to deal
           in the Software without restriction, including without limitation the rights
           to use, copy, modify, merge, publish, distribute, sublicense, and/or sell
           copies of the Software, and to permit persons to whom the Software is
           furnished to do so, subject to the following conditions:
           .
           The above copyright notice and this permission notice shall be included in all
           copies or substantial portions of the Software.
           .
           THE SOFTWARE IS PROVIDED "AS IS", WITHOUT WARRANTY OF ANY KIND, EXPRESS OR
           IMPLIED, INCLUDING BUT NOT LIMITED TO THE WARRANTIES OF MERCHANTABILITY,
           FITNESS FOR A PARTICULAR PURPOSE AND NONINFRINGEMENT. IN NO EVENT SHALL THE
           AUTHORS OR COPYRIGHT HOLDERS BE LIABLE FOR ANY CLAIM, DAMAGES OR OTHER
           LIABILITY, WHETHER IN AN ACTION OF CONTRACT, TORT OR OTHERWISE, ARISING FROM,
           OUT OF OR IN CONNECTION WITH THE SOFTWARE OR THE USE OR OTHER DEALINGS IN THE
           SOFTWARE.
          EOF

          # Build .deb package
          dpkg-deb --build deb-package ${{ matrix.artifact }}

      - name: Upload to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          gh release upload "$VERSION" "${{ matrix.artifact }}" --clobber
