name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
          workdir: cli
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

  release-gui:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: darwin/universal
            artifact: kachlan-gui_darwin_universal.zip
          - os: windows-latest
            platform: windows/amd64
            artifact: kachlan-gui_windows_amd64.zip
          - os: ubuntu-latest
            platform: linux/amd64
            artifact: kachlan-gui_linux_amd64.tar.gz
    runs-on: ${{ matrix.os }}

    defaults:
      run:
        working-directory: gui

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: gui/go.mod
          cache-dependency-path: gui/go.sum

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails
        shell: bash
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        shell: bash
        run: |
          TAGS=""
          if [ "$RUNNER_OS" = "Linux" ]; then
            TAGS="-tags webkit2gtk_41"
          fi
          wails build -platform ${{ matrix.platform }} $TAGS

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          cd build/bin
          zip -r ../../${{ matrix.artifact }} kachlan.app

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd build/bin
          7z a ../../${{ matrix.artifact }} kachlan.exe

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          cd build/bin
          tar czf ../../${{ matrix.artifact }} kachlan

      - name: Upload to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd ..
          VERSION=${GITHUB_REF#refs/tags/}
          FINAL_NAME=$(echo "${{ matrix.artifact }}" | sed "s/kachlan-gui_/kachlan-gui_${VERSION}_/")
          mv "gui/${{ matrix.artifact }}" "$FINAL_NAME"
          gh release upload "$VERSION" "$FINAL_NAME" --clobber
