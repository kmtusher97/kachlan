<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Outer rind gradient -->
    <radialGradient id="rind" cx="50%" cy="50%" r="50%">
      <stop offset="78%" stop-color="#5a9a2f"/>
      <stop offset="85%" stop-color="#4a8725"/>
      <stop offset="92%" stop-color="#3d7420"/>
      <stop offset="100%" stop-color="#2d5a16"/>
    </radialGradient>

    <!-- Pith (white inner ring) -->
    <radialGradient id="pith" cx="50%" cy="50%" r="50%">
      <stop offset="85%" stop-color="#e8f0d8"/>
      <stop offset="100%" stop-color="#d4e4b8"/>
    </radialGradient>

    <!-- Flesh gradient for segments -->
    <radialGradient id="flesh" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4e89a"/>
      <stop offset="40%" stop-color="#b8d96a"/>
      <stop offset="80%" stop-color="#9cc84a"/>
      <stop offset="100%" stop-color="#8aba3a"/>
    </radialGradient>

    <!-- Segment membrane highlight -->
    <linearGradient id="membrane" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0f5e0" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#d8e8b0" stop-opacity="0.2"/>
    </linearGradient>

    <!-- Center glow -->
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5f8e8"/>
      <stop offset="60%" stop-color="#e8f0c8"/>
      <stop offset="100%" stop-color="#d0e0a0"/>
    </radialGradient>

    <!-- Juice drop shine -->
    <radialGradient id="juiceDrop" cx="35%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#c8e070" stop-opacity="0.3"/>
    </radialGradient>

    <!-- Subtle shadow filter -->
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1a3a0a" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Outer rind -->
  <circle cx="200" cy="200" r="175" fill="url(#rind)" filter="url(#softShadow)"/>

  <!-- Pith ring -->
  <circle cx="200" cy="200" r="155" fill="url(#pith)"/>

  <!-- Inner flesh base -->
  <circle cx="200" cy="200" r="140" fill="url(#flesh)"/>

  <!-- 8 Lime segments with membrane lines -->
  <g transform="translate(200,200)">
    <!-- Segment dividing membranes (white lines from center) -->
    <g stroke="#e8f0d0" stroke-width="3" stroke-linecap="round" opacity="0.85">
      <line x1="0" y1="0" x2="0" y2="-138"/>
      <line x1="0" y1="0" x2="97.6" y2="-97.6"/>
      <line x1="0" y1="0" x2="138" y2="0"/>
      <line x1="0" y1="0" x2="97.6" y2="97.6"/>
      <line x1="0" y1="0" x2="0" y2="138"/>
      <line x1="0" y1="0" x2="-97.6" y2="97.6"/>
      <line x1="0" y1="0" x2="-138" y2="0"/>
      <line x1="0" y1="0" x2="-97.6" y2="-97.6"/>
    </g>

    <!-- Individual segment vesicle details (teardrop shapes inside each segment) -->
    <!-- Segment 1: top -->
    <path d="M -8 -25 Q 0 -120 8 -25 Z" fill="#c4dc6a" opacity="0.35"/>
    <path d="M -18 -30 Q 0 -125 18 -30 Z" fill="#b0d050" opacity="0.2"/>

    <!-- Segment 2: top-right -->
    <path d="M 12 -12 Q 90 -90 22 -2 Z" fill="#c4dc6a" opacity="0.35" transform="rotate(0)"/>
    <path d="M 15 -18 Q 95 -95 28 -5 Z" fill="#b0d050" opacity="0.2"/>

    <!-- Segment 3: right -->
    <path d="M 25 -8 Q 120 0 25 8 Z" fill="#c4dc6a" opacity="0.35"/>
    <path d="M 30 -18 Q 125 0 30 18 Z" fill="#b0d050" opacity="0.2"/>

    <!-- Segment 4: bottom-right -->
    <path d="M 12 12 Q 90 90 2 22 Z" fill="#c4dc6a" opacity="0.35"/>
    <path d="M 18 15 Q 95 95 5 28 Z" fill="#b0d050" opacity="0.2"/>

    <!-- Segment 5: bottom -->
    <path d="M -8 25 Q 0 120 8 25 Z" fill="#c4dc6a" opacity="0.35"/>
    <path d="M -18 30 Q 0 125 18 30 Z" fill="#b0d050" opacity="0.2"/>

    <!-- Segment 6: bottom-left -->
    <path d="M -12 12 Q -90 90 -22 2 Z" fill="#c4dc6a" opacity="0.35"/>
    <path d="M -18 15 Q -95 95 -28 5 Z" fill="#b0d050" opacity="0.2"/>

    <!-- Segment 7: left -->
    <path d="M -25 -8 Q -120 0 -25 8 Z" fill="#c4dc6a" opacity="0.35"/>
    <path d="M -30 -18 Q -125 0 -30 18 Z" fill="#b0d050" opacity="0.2"/>

    <!-- Segment 8: top-left -->
    <path d="M -12 -12 Q -90 -90 -2 -22 Z" fill="#c4dc6a" opacity="0.35"/>
    <path d="M -15 -18 Q -95 -95 -5 -28 Z" fill="#b0d050" opacity="0.2"/>

    <!-- Curved segment inner edges for depth -->
    <g fill="none" stroke="#d8e8a8" stroke-width="1.5" opacity="0.5">
      <path d="M 0 -20 Q -40 -80 -12 -130"/>
      <path d="M 0 -20 Q 40 -80 12 -130"/>
      <path d="M 14 -14 Q 55 -55 85 -95"/>
      <path d="M 14 -14 Q 70 -40 95 -85"/>
      <path d="M 20 0 Q 80 -40 130 -12"/>
      <path d="M 20 0 Q 80 40 130 12"/>
      <path d="M 14 14 Q 55 55 85 95"/>
      <path d="M 14 14 Q 70 40 95 85"/>
      <path d="M 0 20 Q -40 80 -12 130"/>
      <path d="M 0 20 Q 40 80 12 130"/>
      <path d="M -14 14 Q -55 55 -85 95"/>
      <path d="M -14 14 Q -70 40 -95 85"/>
      <path d="M -20 0 Q -80 -40 -130 -12"/>
      <path d="M -20 0 Q -80 40 -130 12"/>
      <path d="M -14 -14 Q -55 -55 -85 -95"/>
      <path d="M -14 -14 Q -70 -40 -95 -85"/>
    </g>
  </g>

  <!-- Center circle -->
  <circle cx="200" cy="200" r="18" fill="url(#centerGlow)" stroke="#d8e8a8" stroke-width="1.5"/>
  <circle cx="200" cy="200" r="8" fill="#e8f0d0" opacity="0.7"/>

  <!-- Juice drops / vesicle highlights scattered on segments -->
  <g>
    <circle cx="200" cy="130" r="3" fill="url(#juiceDrop)"/>
    <circle cx="185" cy="148" r="2" fill="url(#juiceDrop)"/>
    <circle cx="215" cy="142" r="2.5" fill="url(#juiceDrop)"/>

    <circle cx="260" cy="155" r="2.5" fill="url(#juiceDrop)"/>
    <circle cx="248" cy="168" r="2" fill="url(#juiceDrop)"/>

    <circle cx="275" cy="200" r="3" fill="url(#juiceDrop)"/>
    <circle cx="262" cy="212" r="2" fill="url(#juiceDrop)"/>

    <circle cx="255" cy="252" r="2.5" fill="url(#juiceDrop)"/>
    <circle cx="240" cy="240" r="2" fill="url(#juiceDrop)"/>

    <circle cx="200" cy="275" r="3" fill="url(#juiceDrop)"/>
    <circle cx="212" cy="260" r="2" fill="url(#juiceDrop)"/>

    <circle cx="145" cy="250" r="2.5" fill="url(#juiceDrop)"/>
    <circle cx="158" cy="238" r="2" fill="url(#juiceDrop)"/>

    <circle cx="128" cy="200" r="3" fill="url(#juiceDrop)"/>
    <circle cx="140" cy="188" r="2" fill="url(#juiceDrop)"/>

    <circle cx="148" cy="150" r="2.5" fill="url(#juiceDrop)"/>
    <circle cx="160" cy="165" r="2" fill="url(#juiceDrop)"/>
  </g>

  <!-- Subtle highlight arc on top-left for 3D feel -->
  <path d="M 120 80 Q 160 55 210 50" stroke="#ffffff" stroke-width="3" fill="none" opacity="0.15" stroke-linecap="round"/>
  <path d="M 130 95 Q 165 70 200 65" stroke="#ffffff" stroke-width="2" fill="none" opacity="0.1" stroke-linecap="round"/>
</svg>
